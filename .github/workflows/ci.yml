name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [py3, pep8]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tox
        run: python -m pip install --upgrade pip tox
      - name: Run tox -e ${{ matrix.env }}
        run: tox -e ${{ matrix.env }}
